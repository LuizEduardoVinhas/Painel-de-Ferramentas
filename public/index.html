<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Ferramentas</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <header class="menu-principal">
        <div class="logo">
            <img src="./img/logo.png" alt="Logo do Painel de Ferramentas">
        </div>
        <div class="titulo-container">
            <h1 class="titulo">Painel de Ferramentas</h1>
            <p class="subtitulo">Sua central de utilitários rápidos e seguros</p>
        </div>
        <nav class="menu-navegacao">
            <button id="btn-gerador" data-screen="senha">Gerador de Senha</button>
            <button id="btn-cpf" data-screen="consulta">Validador de CPF</button>
        </nav>
    </header>

    <main id="app">
        <div class="container-principal">
            <div class="titulo">
                <h1>Bem-vindo ao Painel de Ferramentas</h1>
                <p>Selecione uma das opções acima para gerar uma senha forte ou validar documentos instantaneamente.</p>
            </div>
            
            <div class="imagem">
                <img src="./img/ferramentas.svg" alt="" aria-hidden="true">
            </div>
            
            <div class="falecmg">
                <button id="btn-falecmg">Fale Comigo</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Painel de Ferramentas. Todos os direitos reservados. </p>
        <p>Desenvolvido por <a href="https://github.com/luizgabriel" target="_blank" rel="noopener noreferrer">Luiz Eduardo</a></p>
    </footer>

    <script src="./assets/js/bundle.js"></script>
</body>

</html>
